<!DOCTYPE html>
<html lang="nl-NL"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TechMo Automation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">

    <style>
        /* === BASIS OPMAAK === */
        body {
            font-family: 'Unica One', sans-serif;
            margin: 0;
            padding: 0;
            color: #222;
            background-color: #fff;
            text-transform: uppercase; 
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* --- HEADER & LOGO --- */
        .header-wrapper {
            position: relative; 
            display: flex;
            justify-content: center; 
            padding: 20px 0 10px 0; 
            width: 100%; 
        }
        .menu-toggle {
            position: absolute;
            right: 0; 
            top: 20px; 
            font-size: 36px; 
            cursor: pointer;
            color: #333;
            z-index: 100;
        }        
        .logo-container {
            display: flex;
            margin-top: 0px;
            text-decoration: none;
            width: 70%;
            max-width: 600px;
        }
        .logo-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- FULLSCREEN MENU OVERLAY --- */
        .fullscreen-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 45, 45, 0.96); 
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .fullscreen-menu.active {
            opacity: 1;
            visibility: visible;
        }
        .close-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #ccc; }
        .menu-links {
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .menu-links a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            margin: 12px 0;
            transition: color 0.2s;
        }
        .menu-links a:hover { text-decoration: underline; }
        
        .menu-footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .menu-footer .copyright {
            color: #aaa;
            font-size: 12px;
            margin: 0;
        }
        .menu-socials {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 15px;
        }
        .menu-socials a {
            color: #fff;
            font-size: 16px;
            text-decoration: none;
            border: 1px solid #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
        }
        .menu-socials a:hover {
            background-color: #fff;
            color: #000;
        }

        /* --- Layout Contact Pagina --- */
        main { padding: 40px 0 80px 0; }
        
        .over-layout {
            display: flex;
            gap: 40px; 
            align-items: flex-start; 
        }
        .over-tekst { flex: 1; }
        
        .page-title {
            font-size: 60px;
            font-weight: normal;
            margin-bottom: 20px;
            text-align: left; 
        }
        
        .normale-tekst {
            font-size: 20px; 
            line-height: 1.6; 
            margin-bottom: 20px;
            color: #444;
            text-transform: none; 
        }

        /* Specifiek voor contact links en animatie */
        .contact-link {
            color: #dd1818;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        .contact-link:hover { color: #000; }
        
        .typed-container {
            background-color: #000;
            color: #fff;
            padding: 5px 15px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Google Maps Container */
        .map-container {
            max-width: 500px; 
            width: 100%; 
            height: 400px;
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* --- FOOTER --- */
        .site-footer {
            text-align: center;
            padding: 40px 0; 
        }
        .social-links {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-links a {
            color: #555;
            font-size: 20px;
            text-decoration: none;
        }
        .social-links a:hover { color: #000; }
        .copyright {
            font-size: 14px;
            color: #777;
        }

        /* --- MOBIEL --- */
        @media screen and (max-width: 768px) {
            .menu-footer {
                flex-direction: column-reverse; 
                gap: 15px;
                bottom: 20px;
            }
            .close-btn { top: 20px; right: 20px; }
            .menu-toggle { top: 20px; }
            
            .over-layout { flex-direction: column; }
            .page-title { 
                font-size: 30px;
                text-align: left; 
            }
            .typed-container { padding: 2px 10px; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

    <div id="fullscreen-menu" class="fullscreen-menu">
        <div class="close-btn" id="close-menu"><i class="fas fa-times"></i></div>
        
        <nav class="menu-links">
            <a href="../index.html">Home</a>
            <a href="../over/index.html">Over</a>
            <a href="../technology-in-motion/index.html">Technology in Motion</a>
            <a href="../people-in-motion/index.html">People in Motion</a>
            <a href="index.html">Contact</a>
        </nav>

        <div class="menu-footer">
            <p class="copyright">© Copyright TechMo <span class="current-year"></span>. Alle rechten voorbehouden.</p>
            <ul class="menu-socials">
                <li><a href="https://www.linkedin.com/company/techmo-automation" target="_blank"><i class="fab fa-linkedin-in"></i></a></li>
                <li><a href="#" class="email-link"><i class="far fa-envelope"></i></a></li>
                <li><a href="#" class="wa-link" target="_blank"><i class="fab fa-whatsapp"></i></a></li>
                <li><a href="#" class="tel-link"><i class="fas fa-phone-alt"></i></a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <header class="header-wrapper">
            <a href="../index.html" class="logo-container">
                <img src="../images/TechMo_logo.png" alt="TechMo Automation" class="logo-img" />
            </a>
            <div class="menu-toggle" id="open-menu">
                <svg viewBox="0 0 24 24" width="1em" height="1em" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
        </header>
    </div>

    <main class="container">
        
        <div class="over-layout">
            <div class="over-tekst">
                <h1 class="page-title" style="text-transform: none;">
                    Neem contact op voor <br>
                    <span class="typed-container"><span id="typed-output"></span></span>
                </h1>
                
                <p class="normale-tekst" style="margin-top: 40px;">
                    Stuur een mail naar <a href="#" class="email-link contact-link">contact@techmo.pro</a><br><br>
                    Of bel mij op nummer <a href="#" class="tel-link contact-link">0624134640</a>
                </p>

                <div class="normale-tekst" style="margin-top: 60px;">
                    <h3 style="font-size: 28px; font-weight: normal; margin-bottom: 10px; text-transform: uppercase;">TechMo</h3>
                    Badhuisstraat 3<br>
                    1531 CA Wormer<br>
                    Holland
                </div>
            </div>

            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2428.8872049923985!2d4.80465657668612!3d52.49513247205477!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c5f0a0d0d8bbd5%3A0xc6fb047814c1eb21!2sBadhuisstraat%203%2C%201531%20CA%20Wormer!5e0!3m2!1sen!2snl!4v1700000000000!5m2!1sen!2snl" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </main>

    <footer class="site-footer container">
        <ul class="social-links">
            <li><a href="https://www.linkedin.com/company/techmo-automation" target="_blank"><i class="fab fa-linkedin"></i></a></li>
            <li><a href="#" class="email-link"><i class="far fa-envelope"></i></a></li>
            <li><a href="#" class="wa-link" target="_blank"><i class="fab fa-whatsapp"></i></a></li>
            <li><a href="#" class="tel-link"><i class="fas fa-phone-alt"></i></a></li>
        </ul>
        <div class="copyright">
            <p>© Copyright TechMo <span class="current-year"></span>. Alle rechten voorbehouden.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/1.1.4/typed.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Actueel jaartal in footer injecteren
            $('.current-year').text(new Date().getFullYear());

            // Typemachine effect
            $("#typed-output").typed({
                cursorChar: "_",
                contentType: "html",
                loop: true,
                typeSpeed: 60,
                backSpeed: 30,
                startDelay: 300,
                backDelay: 1500,
                showCursor: true,
                strings: ["vragen", "offertes", "advies", "het maken van een afspraak", "of gewoon om hallo te zeggen.."]
            });

            // Anti-spam bots instellingen (Geavanceerd)
            var W1M8F = "134";
            var H5T3Q = "640";
            var B7K2P = "+31";
            var R9N4X = "624";
            
            var K4R9P2V7 = B7K2P + R9N4X + W1M8F + H5T3Q;
            var M1Z6B8N5 = "31" + R9N4X + W1M8F + H5T3Q;

            $('.tel-link').attr('href', 'tel:' + K4R9P2V7);
            $('.wa-link').attr('href', 'https://api.whatsapp.com/send?phone=' + M1Z6B8N5);

            var V4N9 = "techmo.pro";
            var G7K2 = "contact";
            var D9X4L2P7 = G7K2 + "@" + V4N9;

            $('.email-link').attr('href', 'mailto:' + D9X4L2P7);

            $('#open-menu').click(function() {
                $('#fullscreen-menu').addClass('active');
                $('body').css('overflow', 'hidden');
            });

            $('#close-menu').click(function() {
                $('#fullscreen-menu').removeClass('active');
                $('body').css('overflow', '');
            });
        });
    </script>
</body>
</html>
